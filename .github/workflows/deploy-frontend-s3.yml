name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/deploy-frontend-s3.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: kabi-terraform-state-bucket

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate API base URL
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
        run: |
          if [ -z "$REACT_APP_API_BASE_URL" ]; then
            echo "REACT_APP_API_BASE_URL secret is required. Example: http://your-backend-alb/kabi/api/v1"
            exit 1
          fi

          case "$REACT_APP_API_BASE_URL" in
            *s3-website*|*amazonaws.com/index.html*)
              echo "REACT_APP_API_BASE_URL must point to the backend API, not the S3 frontend website."
              exit 1
              ;;
            */api-docs*|*/kabi/api-docs*)
              echo "REACT_APP_API_BASE_URL must point to the JSON API path, not Swagger docs. Use /kabi/api/v1."
              exit 1
              ;;
          esac

          case "$REACT_APP_API_BASE_URL" in
            */kabi/api/v1|*/api/v1) ;;
            *)
              echo "REACT_APP_API_BASE_URL should end with /kabi/api/v1. Current value: $REACT_APP_API_BASE_URL"
              exit 1
              ;;
          esac

      - name: Build frontend
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
        run: npm run build

      - name: Run Trivy Frontend Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: client/build
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure S3 static website hosting
        run: |
          aws s3 website s3://${{ env.S3_BUCKET }} \
            --index-document index.html \
            --error-document index.html

          aws s3api put-public-access-block \
            --bucket ${{ env.S3_BUCKET }} \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=false,RestrictPublicBuckets=false

          cat > public-read-policy.json <<'EOF'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::${{ env.S3_BUCKET }}/*"
              }
            ]
          }
          EOF

          aws s3api put-bucket-policy \
            --bucket ${{ env.S3_BUCKET }} \
            --policy file://public-read-policy.json

      - name: Upload static assets
        run: |
          aws s3 sync build/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html
        run: |
          aws s3 cp build/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"
