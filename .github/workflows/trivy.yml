name: Trivy Vulnerability Scan

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  filesystem-scan:
    name: Scan repository files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 1

  image-scan:
    name: Scan Docker image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: todo-app-client
            context: ./client
            dockerfile: ./client/Dockerfile
          - image: todo-app-server
            context: ./server/todo-server
            dockerfile: ./server/todo-server/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --file "${{ matrix.dockerfile }}" \
            --tag "${{ matrix.image }}:${{ github.sha }}" \
            "${{ matrix.context }}"

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:${{ github.sha }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 1
